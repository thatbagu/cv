name: Build and Deploy SSH TUI

on:
  push:
    branches: [main]
    paths:
      - 'ssh-tui/**'
      - 'assets/**'
      - 'blog_posts/**'

jobs:
  build-and-deploy:
    runs-on: [self-hosted, homelab]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build binary
        working-directory: ssh-tui
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: nix shell nixpkgs#go --command go build -trimpath -o ../cv-tui .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ssh-tui/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cv-tui:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cv-tui:latest

      - name: Deploy to cluster
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          kubectl rollout restart deployment/cv-tui -n cv
          kubectl rollout status deployment/cv-tui -n cv --timeout=120s
