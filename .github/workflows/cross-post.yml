name: Cross-Post Blog Content

on:
  push:
    branches: [main]
    paths:
      - 'blog_posts/*.md'

permissions:
  contents: write

jobs:
  detect:
    name: Detect posts to publish
    runs-on: ubuntu-latest
    outputs:
      has_posts: ${{ steps.detect.outputs.has_posts }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install PyYAML requests requests-oauthlib

      - name: Detect posts
        id: detect
        run: |
          python .github/workflows/detect_posts_to_publish.py > posts.json
          if [ ! -s posts.json ]; then
            echo "has_posts=false" >> $GITHUB_OUTPUT
          else
            HAS_POSTS=$(python3 -c "
          import json
          with open('posts.json') as f:
              data = json.load(f)
          print('true' if data else 'false')
          ")
            echo "has_posts=$HAS_POSTS" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: posts
          path: posts.json

  post-telegram:
    name: Post to Telegram
    needs: detect
    if: needs.detect.outputs.has_posts == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - run: pip install PyYAML requests
      - uses: actions/download-artifact@v4
        with:
          name: posts
      - run: |
          python .github/workflows/post_to_telegram.py \
            --bot-token "${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            --channel-id "${{ secrets.TELEGRAM_CHANNEL_ID }}" \
            --posts-json posts.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: telegram-results
          path: telegram_results.json

  post-twitter:
    name: Post to Twitter
    needs: detect
    if: needs.detect.outputs.has_posts == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - run: pip install PyYAML tweepy
      - uses: actions/download-artifact@v4
        with:
          name: posts
      - run: |
          python .github/workflows/post_to_twitter.py \
            --client-id "${{ secrets.TWITTER_CLIENT_ID }}" \
            --client-secret "${{ secrets.TWITTER_CLIENT_SECRET }}" \
            --refresh-token "${{ secrets.TWITTER_REFRESH_TOKEN }}" \
            --posts-json posts.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: twitter-results
          path: twitter_results.json

  post-mastodon:
    name: Post to Mastodon
    needs: detect
    if: needs.detect.outputs.has_posts == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - run: pip install PyYAML requests
      - uses: actions/download-artifact@v4
        with:
          name: posts
      - run: |
          python .github/workflows/post_to_mastodon.py \
            --instance-url "${{ secrets.MASTODON_INSTANCE_URL }}" \
            --access-token "${{ secrets.MASTODON_ACCESS_TOKEN }}" \
            --posts-json posts.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mastodon-results
          path: mastodon_results.json

  post-devto:
    name: Post to Dev.to
    needs: detect
    if: needs.detect.outputs.has_posts == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - run: pip install PyYAML requests
      - uses: actions/download-artifact@v4
        with:
          name: posts
      - run: |
          python .github/workflows/post_to_devto.py \
            --api-key "${{ secrets.DEVTO_API_KEY }}" \
            --mode full \
            --posts-json posts.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: devto-results
          path: devto_results.json

  update-and-commit:
    name: Update frontmatter and commit
    needs: [post-telegram, post-twitter, post-mastodon, post-devto]
    if: always() && needs.detect.outputs.has_posts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - run: pip install PyYAML requests

      - uses: actions/download-artifact@v4
        with:
          pattern: '*-results'
          merge-multiple: true

      - name: Update frontmatter
        run: |
          for results_file in telegram_results.json twitter_results.json mastodon_results.json devto_results.json; do
            if [ -f "$results_file" ]; then
              python << EOF
          import json, subprocess
          with open('$results_file') as f:
              results = json.load(f)
          for file_path in results.get('successful_posts', []):
              platform = results.get('platform', '')
              print(f"Marking {file_path} as posted to {platform}")
              subprocess.run([
                  'python', '.github/workflows/detect_posts_to_publish.py',
                  '--update', f'{file_path}:{platform}'
              ], check=True)
          EOF
            fi
          done

      - name: Commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add blog_posts/*.md
            git commit -m "Update posting status for blog posts [skip ci]"
            for i in {1..3}; do
              git push && break || (echo "Retrying..." && sleep 5)
            done
          fi
