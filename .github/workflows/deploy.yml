name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, homelab]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate OG images
        run: python3 .github/workflows/generate_og_images.py

      - name: Generate Atom feed
        run: python3 .github/workflows/generate_feeds.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/website:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/website:latest

      - name: Deploy to cluster
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          kubectl rollout restart deployment/cv -n cv
          kubectl rollout status deployment/cv -n cv --timeout=120s
